<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Task CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f2f4f7;
margin:0;
padding:20px;
}

.hidden{
display:none;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{background:#4CAF50;color:white}
.send{background:#2196F3;color:white}
.settings{background:#555;color:white}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h2>Введите пароль</h2>

<input type="password" id="password">

<button onclick="login()">Войти</button>

</div>

<!-- APP -->

<div id="app" class="hidden">

<div class="header">

<h2>Task CRM</h2>

<div>

<button class="add" onclick="openTask()">+ задача</button>
<button class="send" onclick="sendTasks()">Назначить</button>
<button class="settings" onclick="openSettings()">⚙</button>

</div>

</div>

<div id="tasks"></div>

</div>

<!-- TASK MODAL -->

<div class="modal" id="taskModal">

<div class="modal-content">

<h3>Задача</h3>

<label>Название</label>
<select id="taskName"></select>

<label>Дополнительный текст</label>
<select id="taskDetail"></select>

<label>Описание</label>
<textarea id="taskDescription"></textarea>

<label>Срок</label>
<input type="datetime-local" id="taskDate">

<button onclick="saveTask()">Сохранить</button>

</div>

</div>

<!-- SETTINGS -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<h3>Настройки</h3>

<label>BOT TOKEN</label>
<input id="botToken">

<label>CHAT ID</label>
<input id="chatId">

<button onclick="saveSettings()">Сохранить</button>

<hr>

<label>Добавить задачу</label>
<input id="newTaskOption">
<button onclick="addOption('task')">Добавить</button>

<label>Добавить деталь</label>
<input id="newDetailOption">
<button onclick="addOption('detail')">Добавить</button>

</div>

</div>

<script>

const PASSWORD="7575"

function login(){

if(password.value===PASSWORD){

login.style.display="none"
app.classList.remove("hidden")

init()

}else{

alert("Неверный пароль")

}

}

const supabaseUrl="https://xvyhstvhgmdbstfoglkh.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2eWhzdHZoZ21kYnN0Zm9nbGtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjUzODYsImV4cCI6MjA4OTIwMTM4Nn0.bha5NRonWnsB6Q4bbYi0s1iBPY8MrvfrXi29Rf-9a28"

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey)

let settings={}
let taskOptions=[]
let detailOptions=[]

async function init(){

loadSettings()
loadOptions()
loadTasks()

}

async function loadSettings(){

let {data}=await supabaseClient
.from("settings")
.select("*")
.single()

settings=data||{}

if(settings){

botToken.value=settings.bot_token||""
chatId.value=settings.chat_id||""

}

}

async function saveSettings(){

await supabaseClient
.from("settings")
upsert({

id:1,
bot_token:botToken.value,
chat_id:chatId.value

})

alert("сохранено")

}

async function loadOptions(){

let {data}=await supabaseClient
.from("options")
.select("*")

taskOptions=[]
detailOptions=[]

data.forEach(o=>{

if(o.type==="task") taskOptions.push(o.value)
if(o.type==="detail") detailOptions.push(o.value)

})

renderOptions()

}

function renderOptions(){

taskName.innerHTML=""
taskDetail.innerHTML=""

taskOptions.forEach(v=>{

let o=document.createElement("option")
o.textContent=v
taskName.appendChild(o)

})

detailOptions.forEach(v=>{

let o=document.createElement("option")
o.textContent=v
taskDetail.appendChild(o)

})

}

async function addOption(type){

let value=type==="task"?newTaskOption.value:newDetailOption.value

await supabaseClient
.from("options")
.insert({

type:type,
value:value

})

loadOptions()

}

async function loadTasks(){

let {data}=await supabaseClient
.from("tasks")
.select("*")

renderTasks(data)

}

function renderTasks(tasksList){

tasks.innerHTML=""

tasksList.forEach(t=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<b>${t.name} ${t.detail||""}</b>

${t.description?`<p>${t.description}</p>`:""}

${t.date?`<p>⏰ ${formatDate(t.date)}</p>`:""}

`

tasks.appendChild(div)

})

}

function openTask(){

taskModal.style.display="flex"

}

async function saveTask(){

await supabaseClient
.from("tasks")
.insert({

name:taskName.value,
detail:taskDetail.value,
description:taskDescription.value,
date:taskDate.value

})

taskModal.style.display="none"

loadTasks()

}

function formatDate(dateStr){

let d=new Date(dateStr)

return d.toLocaleString()

}

async function sendTasks(){

let {data}=await supabaseClient
.from("tasks")
.select("*")

for(let task of data){

let text=`📌 ${task.name} ${task.detail||""}`

if(task.description){

text+=`\n\n${task.description}`

}

if(task.date){

text+=`\n\n⏰ Срок: ${formatDate(task.date)}`

}

await fetch(`https://api.telegram.org/bot${settings.bot_token}/sendMessage`,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

chat_id:settings.chat_id,
text:text

})

})

}

alert("Задачи отправлены")

}

function openSettings(){

settingsModal.style.display="flex"

}

</script>

</body>
</html>
