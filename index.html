<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Task CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

/* LOGIN */

#loginScreen{
text-align:center;
margin-top:60px;
}

#passwordInput{
font-size:28px;
text-align:center;
width:200px;
padding:10px;
margin:20px auto;
display:block;
}

.keyboard{
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
justify-content:center;
}

.keyboard button{
font-size:22px;
padding:15px;
border:none;
border-radius:10px;
background:#2196F3;
color:white;
}

/* APP */

#app{
display:none;
padding:15px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
padding:10px;
border:none;
border-radius:6px;
}

.add{background:#4CAF50;color:white}
.send{background:#2196F3;color:white}
.settings{background:#555;color:white}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* MODALS */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Введите пароль</h2>

<input id="passwordInput" readonly>

<div class="keyboard">

<button onclick="pressKey('1')">1</button>
<button onclick="pressKey('2')">2</button>
<button onclick="pressKey('3')">3</button>

<button onclick="pressKey('4')">4</button>
<button onclick="pressKey('5')">5</button>
<button onclick="pressKey('6')">6</button>

<button onclick="pressKey('7')">7</button>
<button onclick="pressKey('8')">8</button>
<button onclick="pressKey('9')">9</button>

<button onclick="deleteKey()">←</button>
<button onclick="pressKey('0')">0</button>
<button onclick="submitPassword()">✓</button>

</div>

</div>

<!-- APP -->

<div id="app">

<div class="header">

<h3>Task CRM</h3>

<div>

<button class="add" onclick="openTask()">+</button>
<button class="send" onclick="sendTasks()">→</button>
<button class="settings" onclick="openSettings()">⚙</button>

</div>

</div>

<div id="tasks"></div>

</div>

<!-- TASK MODAL -->

<div class="modal" id="taskModal">

<div class="modal-content">

<h3>Задача</h3>

<label>Название</label>
<select id="taskName"></select>

<label>Доп. текст</label>
<select id="taskDetail"></select>

<label>Описание</label>
<textarea id="taskDescription"></textarea>

<label>Срок</label>
<input type="datetime-local" id="taskDate">

<button onclick="saveTask()">Сохранить</button>

</div>

</div>

<!-- SETTINGS -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<h3>Настройки</h3>

<label>BOT TOKEN</label>
<input id="botToken">

<label>CHAT ID</label>
<input id="chatId">

<button onclick="saveSettings()">Сохранить</button>

<hr>

<label>Новая задача</label>
<input id="newTaskOption">
<button onclick="addOption('task')">Добавить</button>

<label>Новая деталь</label>
<input id="newDetailOption">
<button onclick="addOption('detail')">Добавить</button>

</div>

</div>

<script>

const PASSWORD="7575"

let pass=""

function pressKey(n){

pass+=n

passwordInput.value="*".repeat(pass.length)

}

function deleteKey(){

pass=pass.slice(0,-1)

passwordInput.value="*".repeat(pass.length)

}

function submitPassword(){

if(pass===PASSWORD){

loginScreen.style.display="none"
app.style.display="block"

init()

}else{

alert("Неверный пароль")

pass=""
passwordInput.value=""

}

}

/* SUPABASE */

const SUPABASE_URL="https://xvyhstvhgmdbstfoglkh.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2eWhzdHZoZ21kYnN0Zm9nbGtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjUzODYsImV4cCI6MjA4OTIwMTM4Nn0.bha5NRonWnsB6Q4bbYi0s1iBPY8MrvfrXi29Rf-9a28"

const supabaseClient=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

let settings={}
let taskOptions=[]
let detailOptions=[]

async function init(){

await loadSettings()
await loadOptions()
await loadTasks()

}

async function loadSettings(){

let {data}=await supabaseClient
.from("settings")
.select("*")
.eq("id",1)
.single()

if(data){

settings=data

botToken.value=data.bot_token||""
chatId.value=data.chat_id||""

}

}

async function saveSettings(){

await supabaseClient
.from("settings")
upsert({

id:1,
bot_token:botToken.value,
chat_id:chatId.value

})

alert("сохранено")

}

async function loadOptions(){

let {data}=await supabaseClient
.from("options")
.select("*")

taskOptions=[]
detailOptions=[]

data.forEach(o=>{

if(o.type==="task") taskOptions.push(o.value)
if(o.type==="detail") detailOptions.push(o.value)

})

renderOptions()

}

function renderOptions(){

taskName.innerHTML=""
taskDetail.innerHTML=""

taskOptions.forEach(v=>{

let o=document.createElement("option")
o.textContent=v
taskName.appendChild(o)

})

detailOptions.forEach(v=>{

let o=document.createElement("option")
o.textContent=v
taskDetail.appendChild(o)

})

}

async function addOption(type){

let value=type==="task"
?newTaskOption.value
:newDetailOption.value

await supabaseClient
.from("options")
.insert({

type:type,
value:value

})

loadOptions()

}

async function loadTasks(){

let {data}=await supabaseClient
.from("tasks")
.select("*")

renderTasks(data)

}

function renderTasks(list){

tasks.innerHTML=""

list.forEach(t=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<b>${t.name} ${t.detail||""}</b>

${t.description?`<p>${t.description}</p>`:""}

${t.date?`<p>⏰ ${formatDate(t.date)}</p>`:""}

`

tasks.appendChild(div)

})

}

function openTask(){

taskModal.style.display="flex"

}

async function saveTask(){

await supabaseClient
.from("tasks")
.insert({

name:taskName.value,
detail:taskDetail.value,
description:taskDescription.value,
date:taskDate.value

})

taskModal.style.display="none"

loadTasks()

}

function formatDate(d){

return new Date(d).toLocaleString()

}

async function sendTasks(){

let {data}=await supabaseClient
.from("tasks")
.select("*")

for(let task of data){

let text=`📌 ${task.name} ${task.detail||""}`

if(task.description){

text+=`\n\n${task.description}`

}

if(task.date){

text+=`\n\n⏰ Срок: ${formatDate(task.date)}`

}

await fetch(`https://api.telegram.org/bot${settings.bot_token}/sendMessage`,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

chat_id:settings.chat_id,
text:text

})

})

}

alert("Задачи отправлены")

}

function openSettings(){

settingsModal.style.display="flex"

}

</script>

</body>
</html>
