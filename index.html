<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Task CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* LOGIN */

#loginScreen{
text-align:center;
margin-top:60px;
}

#passwordInput{
font-size:26px;
text-align:center;
width:200px;
padding:10px;
margin:20px auto;
display:block;
}

.keyboard{
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
justify-content:center;
}

.keyboard button{
font-size:22px;
padding:15px;
border:none;
border-radius:10px;
background:#2196F3;
color:white;
}

/* APP */

#app{
display:none;
padding:15px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.header button{
margin-left:5px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-size:18px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Введите пароль</h2>

<input id="passwordInput" readonly>

<div class="keyboard">

<button onclick="pressKey('1')">1</button>
<button onclick="pressKey('2')">2</button>
<button onclick="pressKey('3')">3</button>

<button onclick="pressKey('4')">4</button>
<button onclick="pressKey('5')">5</button>
<button onclick="pressKey('6')">6</button>

<button onclick="pressKey('7')">7</button>
<button onclick="pressKey('8')">8</button>
<button onclick="pressKey('9')">9</button>

<button onclick="deleteKey()">←</button>
<button onclick="pressKey('0')">0</button>
<button onclick="submitPassword()">✓</button>

</div>

</div>


<!-- APP -->

<div id="app">

<div class="header">

<h3>Task CRM</h3>

<div>

<button onclick="openTask()">➕</button>
<button onclick="sendTasks()">📤</button>
<button onclick="openSettings()">⚙</button>

</div>

</div>

<div id="tasks"></div>

</div>


<!-- TASK MODAL -->

<div class="modal" id="taskModal">

<div class="modal-content">

<span class="close" onclick="closeTask()">✖</span>

<h3>Добавить задачу</h3>

<label>Задача</label>
<select id="taskName"></select>

<label>Дополнение</label>
<select id="taskDetail"></select>

<label>Описание</label>
<textarea id="taskDescription"></textarea>

<label>Срок</label>
<input type="datetime-local" id="taskDate">

<button onclick="saveTask()">Сохранить</button>

</div>

</div>


<!-- SETTINGS -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<span class="close" onclick="closeSettings()">✖</span>

<h3>Настройки</h3>

<label>BOT TOKEN</label>
<input id="botToken">

<label>CHAT ID</label>
<input id="chatId">

<button onclick="saveSettings()">Сохранить</button>

</div>

</div>


<script>

/* LOGIN */

const PASSWORD="7575"

let pass=""

function pressKey(n){

pass+=n

document.getElementById("passwordInput").value="*".repeat(pass.length)

}

function deleteKey(){

pass=pass.slice(0,-1)

document.getElementById("passwordInput").value="*".repeat(pass.length)

}

function submitPassword(){

if(pass===PASSWORD){

document.getElementById("loginScreen").style.display="none"
document.getElementById("app").style.display="block"

init()

}else{

alert("Неверный пароль")

pass=""
document.getElementById("passwordInput").value=""

}

}


/* SUPABASE */

const SUPABASE_URL="https://xvyhstvhgmdbstfoglkh.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2eWhzdHZoZ21kYnN0Zm9nbGtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjUzODYsImV4cCI6MjA4OTIwMTM4Nn0.bha5NRonWnsB6Q4bbYi0s1iBPY8MrvfrXi29Rf-9a28"

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)


/* INIT */

async function init(){

loadSettings()
loadTasks()

}


/* SETTINGS */

async function loadSettings(){

let {data,error} = await supabaseClient
.from("settings")
.select("*")
.eq("id",1)
.single()

if(error) console.log(error)

if(data){

document.getElementById("botToken").value=data.bot_token||""
document.getElementById("chatId").value=data.chat_id||""

}

}

async function saveSettings(){

const token=document.getElementById("botToken").value
const chat=document.getElementById("chatId").value

let {error} = await supabaseClient
.from("settings")
.update({
bot_token:token,
chat_id:chat
})
.eq("id",1)

if(error){

console.log(error)
alert("Ошибка сохранения")

}else{

alert("Сохранено")

}

}


/* TASKS */

async function loadTasks(){

let {data,error}=await supabaseClient
.from("tasks")
.select("*")

if(error){

console.log(error)
return

}

renderTasks(data)

}

function renderTasks(list){

const container=document.getElementById("tasks")

container.innerHTML=""

list.forEach(t=>{

let div=document.createElement("div")

div.className="card"

let text=`<b>${t.name} ${t.detail||""}</b>`

if(t.description){

text+=`<p>${t.description}</p>`

}

if(t.date){

text+=`<p>⏰ ${new Date(t.date).toLocaleString()}</p>`

}

div.innerHTML=text

container.appendChild(div)

})

}


async function saveTask(){

const name=document.getElementById("taskName").value
const detail=document.getElementById("taskDetail").value
const desc=document.getElementById("taskDescription").value
const date=document.getElementById("taskDate").value

let {error}=await supabaseClient
.from("tasks")
.insert({

name:name,
detail:detail,
description:desc,
date:date

})

if(error){

console.log(error)
alert("Ошибка добавления")

}else{

closeTask()
loadTasks()

}

}


/* TELEGRAM */

async function sendTasks(){

let {data}=await supabaseClient
.from("tasks")
.select("*")

const token=document.getElementById("botToken").value
const chat=document.getElementById("chatId").value

for(let task of data){

let text=`📌 ${task.name} ${task.detail||""}`

if(task.description){

text+=`\n\n${task.description}`

}

if(task.date){

text+=`\n\n⏰ Срок: ${new Date(task.date).toLocaleString()}`

}

await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

chat_id:chat,
text:text

})

})

}

alert("Отправлено")

}


/* MODALS */

function openTask(){

document.getElementById("taskModal").style.display="flex"

}

function closeTask(){

document.getElementById("taskModal").style.display="none"

}

function openSettings(){

document.getElementById("settingsModal").style.display="flex"

}

function closeSettings(){

document.getElementById("settingsModal").style.display="none"

}

</script>

</body>
</html>
