<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экран комплектовщика</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 1em; background: #eef2f7; }
    h1 { font-size: 2em; text-align: center; margin-bottom: 1em; color: #2c3e50; }
    .order { background: #fff; border-radius: 15px; padding: 1em; margin-bottom: 1.5em; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1em; font-size: 1.2em; color: #34495e; }
    .order-id { font-weight: bold; font-size: 1.3em; color: #2980b9; }
    .btn { padding: 1em; font-size: 1.1em; margin: 0.5em 0.25em; border: none; border-radius: 10px; cursor: pointer; width: 48%; }
    .btn-print { background: #f39c12; color: #fff; }
    .btn-packaged { background: #27ae60; color: #fff; }
    .btn-row { display: flex; justify-content: space-between; }
    .items { display: flex; flex-wrap: wrap; gap: 1em; justify-content: center; }
    .item { background: #ecf0f1; border-radius: 10px; padding: 0.5em; width: 45%; text-align: center; transition: background 0.3s; }
    .item.correct { background: #d4edda; }
    .item.error { background: #f8d7da; }
    .item img { max-width: 100px; max-height: 100px; margin-bottom: 0.5em; border-radius: 8px; }
    .barcode-input { width: 100%; font-size: 1.5em; padding: 0.5em; margin: 1em 0; border-radius: 10px; border: 2px solid #ccc; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>📦 Экран комплектовщика</h1>
  <input type="text" id="barcode" class="barcode-input" placeholder="Сканируйте штрихкод" autofocus>
  <div id="orders"></div>

  <script>
    let orders = [];

    async function fetchOrders() {
      try {
        const response = await fetch('/api/orders');
        orders = await response.json();
        renderOrders();
      } catch (error) {
        console.error('Ошибка загрузки заказов:', error);
      }
    }

    const ordersDiv = document.getElementById('orders');

    function renderOrders() {
      ordersDiv.innerHTML = '';
      orders.forEach(order => {
        const div = document.createElement('div');
        div.className = 'order';
        div.innerHTML = `
          <div class="order-header">
            <span class="order-id">Заказ #${order.id}</span>
            <span>ТТН: ${order.ttn}</span>
          </div>
          <div class="items"></div>
          <div class="btn-row">
            <button class="btn btn-print">🖨️ Печать ТТН</button>
            <button class="btn btn-packaged">✅ Упаковано</button>
          </div>
        `;

        const itemsDiv = div.querySelector('.items');
        order.items.forEach(item => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'item';
          itemDiv.innerHTML = `
            <img src="${item.img}" alt="${item.name}">
            <div><strong>${item.name}</strong></div>
            <div>${item.scanned}/${item.qty}</div>
          `;
          itemsDiv.append(itemDiv);
        });

        div.querySelector('.btn-print').onclick = () => {
          fetch(`/api/orders/${order.id}/print-ttn`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
              if (data.pdfUrl) window.open(data.pdfUrl, '_blank');
              else alert('Ошибка при печати ТТН');
            });
        };

        div.querySelector('.btn-packaged').onclick = () => {
          fetch(`/api/orders/${order.id}/complete`, { method: 'POST' })
            .then(() => fetchOrders());
        };

        ordersDiv.append(div);
      });
    }

    document.getElementById('barcode').addEventListener('change', e => {
      const code = e.target.value.trim();
      let found = false;
      for (const order of orders) {
        for (const item of order.items) {
          if (item.sku === code) {
            if (item.scanned < item.qty) {
              item.scanned++;
              found = true;
              break;
            }
          }
        }
      }
      if (!found) alert('❌ Товар не найден или уже собран.');
      renderOrders();
      e.target.value = '';
    });

    fetchOrders();
  </script>
</body>
</html>
