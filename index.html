<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Пизда</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#f2f2f7;
margin:0;
}

/* LOGIN */

#loginScreen{
text-align:center;
margin-top:80px;
}

#passwordInput{
font-size:30px;
width:200px;
text-align:center;
padding:10px;
margin:20px auto;
display:block;
border-radius:12px;
border:none;
background:white;
}

.keyboard{
display:grid;
grid-template-columns:repeat(3,80px);
gap:15px;
justify-content:center;
}

.keyboard button{
height:70px;
width:70px;
border-radius:50%;
border:none;
font-size:22px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* APP */

#app{
display:none;
padding:15px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.roundBtn{
height:45px;
width:45px;
border-radius:50%;
border:none;
font-size:18px;
background:white;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-left:5px;
}

/* CARDS */

.card{
background:white;
border-radius:16px;
padding:15px;
margin-bottom:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
border-radius:20px;
padding:20px;
width:90%;
max-width:420px;
max-height:85vh;
overflow:auto;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

.listItem{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

.smallBtn{
border:none;
background:none;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Войти в пизду</h2>

<input id="passwordInput" readonly>

<div class="keyboard">

<button onclick="pressKey('1')">1</button>
<button onclick="pressKey('2')">2</button>
<button onclick="pressKey('3')">3</button>

<button onclick="pressKey('4')">4</button>
<button onclick="pressKey('5')">5</button>
<button onclick="pressKey('6')">6</button>

<button onclick="pressKey('7')">7</button>
<button onclick="pressKey('8')">8</button>
<button onclick="pressKey('9')">9</button>

<button onclick="deleteKey()">←</button>
<button onclick="pressKey('0')">0</button>
<button onclick="submitPassword()">✓</button>

</div>

</div>


<!-- APP -->

<div id="app">

<div class="header">

<h3>Пизда</h3>

<div>

<button class="roundBtn" onclick="openTask()">＋</button>
<button class="roundBtn" onclick="sendTasks()">📤</button>
<button class="roundBtn" onclick="openSettings()">⚙</button>

</div>

</div>

<div id="tasks"></div>

</div>


<!-- TASK MODAL -->

<div class="modal" id="taskModal">

<div class="modal-content">

<span class="close" onclick="closeTask()">✖</span>

<h3>Задача</h3>

<select id="taskName"></select>

<select id="taskDetail"></select>

<textarea id="taskDescription" placeholder="Описание"></textarea>

<input type="datetime-local" id="taskDate">

<button onclick="saveTask()">Сохранить</button>

</div>

</div>


<!-- SETTINGS -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<span class="close" onclick="closeSettings()">✖</span>

<h3>Настройки</h3>

<input id="botToken" placeholder="BOT TOKEN">
<input id="chatId" placeholder="CHAT ID">

<button onclick="saveSettings()">Сохранить</button>

<h3>Задачи</h3>

<input id="newTaskOption" placeholder="Добавить задачу">
<button onclick="addOption('task')">Добавить</button>

<div id="taskOptionsList"></div>

<h3>Дополнения</h3>

<input id="newDetailOption" placeholder="Добавить дополнение">
<button onclick="addOption('detail')">Добавить</button>

<div id="detailOptionsList"></div>

</div>

</div>


<script>

const PASSWORD="7575"
let pass=""

function pressKey(n){
pass+=n
passwordInput.value="*".repeat(pass.length)
}

function deleteKey(){
pass=pass.slice(0,-1)
passwordInput.value="*".repeat(pass.length)
}

function submitPassword(){

if(pass===PASSWORD){

loginScreen.style.display="none"
app.style.display="block"

init()

}else{

alert("Неверный пароль")

pass=""
passwordInput.value=""

}

}

const SUPABASE_URL="https://xvyhstvhgmdbstfoglkh.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2eWhzdHZoZ21kYnN0Zm9nbGtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjUzODYsImV4cCI6MjA4OTIwMTM4Nn0.bha5NRonWnsB6Q4bbYi0s1iBPY8MrvfrXi29Rf-9a28"

const supabaseClient=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

let editTaskId=null

async function init(){

loadSettings()
loadOptions()
loadTasks()

}

async function loadSettings(){

let {data}=await supabaseClient
.from("settings")
.select("*")
.eq("id",1)
.single()

if(data){

botToken.value=data.bot_token||""
chatId.value=data.chat_id||""

}

}

async function saveSettings(){

await supabaseClient
.from("settings")
.update({
bot_token:botToken.value,
chat_id:chatId.value
})
.eq("id",1)

alert("Сохранено")

}

async function loadOptions(){

let {data}=await supabaseClient
.from("options")
.select("*")

taskName.innerHTML=""
taskDetail.innerHTML=""

taskOptionsList.innerHTML=""
detailOptionsList.innerHTML=""

data.forEach(o=>{

let option=document.createElement("option")
option.textContent=o.value
option.value=o.value

if(o.type==="task"){
taskName.appendChild(option)

taskOptionsList.innerHTML+=`
<div class="listItem">
${o.value}
<div>
<button class="smallBtn" onclick="editOption('${o.id}','${o.value}')">✏️</button>
<button class="smallBtn" onclick="deleteOption('${o.id}')">🗑</button>
</div>
</div>`
}

if(o.type==="detail"){
taskDetail.appendChild(option)

detailOptionsList.innerHTML+=`
<div class="listItem">
${o.value}
<div>
<button class="smallBtn" onclick="editOption('${o.id}','${o.value}')">✏️</button>
<button class="smallBtn" onclick="deleteOption('${o.id}')">🗑</button>
</div>
</div>`
}

})

}

async function addOption(type){

let value = type==="task"
?newTaskOption.value
:newDetailOption.value

await supabaseClient
.from("options")
.insert({
type:type,
value:value
})

if(type==="task") newTaskOption.value=""
else newDetailOption.value=""

loadOptions()

}

async function editOption(id,value){

let newValue=prompt("Редактировать",value)

if(!newValue) return

await supabaseClient
.from("options")
.update({value:newValue})
.eq("id",id)

loadOptions()

}

async function deleteOption(id){

await supabaseClient
.from("options")
.delete()
.eq("id",id)

loadOptions()

}

async function loadTasks(){

let {data}=await supabaseClient
.from("tasks")
.select("*")

tasks.innerHTML=""

data.forEach(t=>{

tasks.innerHTML+=`
<div class="card">

<b>${t.name} ${t.detail||""}</b>

${t.description?`<p>${t.description}</p>`:""}

${t.date?`<p>⏰ ${new Date(t.date).toLocaleString()}</p>`:""}

<div>

<button onclick="editTask('${t.id}','${t.name}','${t.detail}','${t.description}','${t.date}')">✏️</button>

<button onclick="deleteTask('${t.id}')">🗑</button>

</div>

</div>
`

})

}

function openTask(){

editTaskId=null
taskModal.style.display="flex"

}

function closeTask(){

taskModal.style.display="none"

}

function openSettings(){

settingsModal.style.display="flex"

}

function closeSettings(){

settingsModal.style.display="none"

}

async function saveTask(){

let name=taskName.value
let detail=taskDetail.value
let desc=taskDescription.value
let date=taskDate.value

if(editTaskId){

await supabaseClient
.from("tasks")
.update({
name:name,
detail:detail,
description:desc,
date:date||null
})
.eq("id",editTaskId)

}else{

await supabaseClient
.from("tasks")
.insert({
name:name,
detail:detail,
description:desc,
date:date||null
})

}

closeTask()

loadTasks()

}

function editTask(id,name,detail,desc,date){

editTaskId=id

taskName.value=name
taskDetail.value=detail
taskDescription.value=desc||""
taskDate.value=date||""

openTask()

}

async function deleteTask(id){

await supabaseClient
.from("tasks")
.delete()
.eq("id",id)

loadTasks()

}

async function sendTasks(){

let {data}=await supabaseClient
.from("tasks")
.select("*")

for(let task of data){

let text=`📌 ${task.name} ${task.detail||""}`

if(task.description){

text+=`\n\n${task.description}`

}

if(task.date){

text+=`\n\n⏰ ${new Date(task.date).toLocaleString()}`

}

await fetch(`https://api.telegram.org/bot${botToken.value}/sendMessage`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
chat_id:chatId.value,
text:text
})

})

}

alert("Задачи отправлены")

}

</script>

</body>
</html>
